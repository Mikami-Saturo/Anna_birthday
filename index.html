<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anne Emma, es-tu prête ? 🎉</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=Quicksand:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/horror.css" />

    <style>
      body {
        background-image: url("./medias/OIP.jpg");
        background-size: cover; /* couvre tout l'écran */
        background-position: center; /* centre l'image */
        background-repeat: no-repeat; /* évite la répétition */
      }
    </style>
  </head>
  <body>
    <div id="page1">
      <div class="content">
        <h1 class="glitch">Es-tu prête ?</h1>
        <p class="horror-text">Es-tu prête pour la suite ??</p>
        <div class="horror-buttons">
          <button class="horror-btn horror-btn-yes" onclick="acceptHorror()">
            OUI
          </button>
          <button
            class="horror-btn horror-btn-no"
            onclick="dodgeNo(event, 'horror')"
          >
            NON
            <span class="click-again" id="horrorClickAgain"
              >Clique encore pour sortir</span
            >
          </button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
